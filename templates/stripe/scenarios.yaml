# Stripe API Sandbox — Scenarios
# Auto-generated by Sandbox AI Agent

scenarios:
  default:
    description: Happy path scenario where all Stripe API endpoints return successful
      responses with valid data.
    auth_enabled: true
    overrides: []
  auth_failure:
    description: All requests fail authentication, simulating an invalid, expired,
      or missing Bearer token.
    auth_enabled: false
    overrides:
    - operation_id: '*'
      response_status: 401
      error_code: authentication_required
      error_detail: Invalid API key provided. You did not provide a valid API key.
        Ensure your Authorization header contains a valid Bearer token.
  rate_limited:
    description: All requests are throttled and return HTTP 429, simulating Stripe's
      rate-limiting behavior under heavy load.
    auth_enabled: true
    overrides:
    - operation_id: '*'
      response_status: 429
      error_code: rate_limit
      error_detail: Too many requests hit the API too quickly. We recommend an exponential
        backoff of your requests.
  payment_declined:
    description: Charge creation requests are declined by the card issuer, simulating
      a generic card decline scenario.
    auth_enabled: true
    overrides:
    - operation_id: createCharge
      response_status: 402
      error_code: card_declined
      error_detail: The card was declined. The customer's card issuer has declined
        the transaction. The customer should contact their card issuer for more information.
    - operation_id: captureCharge
      response_status: 402
      error_code: card_declined
      error_detail: The card was declined during capture. The authorization may have
        expired or been revoked by the issuer.
  insufficient_funds:
    description: Charge creation fails due to insufficient funds on the customer's
      payment method.
    auth_enabled: true
    overrides:
    - operation_id: createCharge
      response_status: 402
      error_code: insufficient_funds
      error_detail: The card has insufficient funds to complete the purchase. The
        customer should use an alternative payment method.
    - operation_id: captureCharge
      response_status: 402
      error_code: insufficient_funds
      error_detail: The card has insufficient funds to complete the capture. The authorized
        amount may no longer be available.
  fraud_hold:
    description: Charges are flagged as high-risk by Stripe Radar and placed under
      review, with disputes auto-opened for fraud.
    auth_enabled: true
    overrides:
    - operation_id: createCharge
      response_status: 402
      error_code: fraudulent
      error_detail: The charge has been flagged as potentially fraudulent by Stripe
        Radar. The payment has been blocked to protect against fraud.
    - operation_id: listDisputes
      response_status: 200
      error_code: null
      error_detail: Returns disputes with reason 'fraudulent' in an open state, simulating
        fraud-related chargebacks on flagged charges.
    - operation_id: updateDispute
      response_status: 400
      error_code: dispute_not_eligible
      error_detail: This dispute is under fraud review and cannot be updated until
        the review is complete.
  processing_error:
    description: Stripe's payment processor encounters an intermittent error, causing
      charge and account operations to fail with server-side issues.
    auth_enabled: true
    overrides:
    - operation_id: createCharge
      response_status: 500
      error_code: processing_error
      error_detail: An error occurred while processing the card. The payment could
        not be completed due to a processing failure. Please try again.
    - operation_id: captureCharge
      response_status: 500
      error_code: processing_error
      error_detail: An error occurred while capturing the charge. The processor did
        not respond in time. Please retry the capture.
    - operation_id: createAccount
      response_status: 500
      error_code: processing_error
      error_detail: An internal error occurred while creating the connected account.
        Please retry the request.
    - operation_id: createExternalAccount
      response_status: 500
      error_code: processing_error
      error_detail: An error occurred while linking the external account. The banking
        partner did not respond. Please retry.
  account_onboarding_failure:
    description: Connected account creation and onboarding flows fail due to identity
      verification issues and restricted capabilities.
    auth_enabled: true
    overrides:
    - operation_id: createAccount
      response_status: 400
      error_code: invalid_request_error
      error_detail: The account could not be created because the provided identity
        information could not be verified. Please check the submitted details.
    - operation_id: createAccountLink
      response_status: 400
      error_code: account_invalid
      error_detail: The account referenced is in a restricted state and cannot generate
        an onboarding link at this time.
    - operation_id: createAccountSession
      response_status: 400
      error_code: account_invalid
      error_detail: Cannot create an account session for an account that has not completed
        identity verification.
    - operation_id: updateCapability
      response_status: 400
      error_code: capability_not_available
      error_detail: The requested capability cannot be enabled because the account
        has outstanding verification requirements.
    - operation_id: createPerson
      response_status: 400
      error_code: invalid_request_error
      error_detail: The person could not be added because the account has reached
        its maximum number of representatives or the provided information is invalid.
  dispute_escalation:
    description: All dispute-related operations simulate an escalated chargeback scenario
      where disputes are lost and refunds on application fees fail.
    auth_enabled: true
    overrides:
    - operation_id: updateDispute
      response_status: 400
      error_code: dispute_already_closed
      error_detail: This dispute has already been closed with a status of 'lost'.
        No further evidence can be submitted.
    - operation_id: closeDispute
      response_status: 400
      error_code: dispute_already_closed
      error_detail: This dispute has already been resolved and cannot be closed again.
    - operation_id: createApplicationFeeRefund
      response_status: 400
      error_code: charge_disputed
      error_detail: The application fee cannot be refunded because the underlying
        charge is currently disputed. Resolve the dispute first.
    - operation_id: retrieveCharge
      response_status: 200
      error_code: null
      error_detail: Returns charge objects with disputed=true and a linked dispute
        in 'lost' status, reflecting funds withdrawn from the account.
