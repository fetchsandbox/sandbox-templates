openapi: 3.0.3
info:
  title: GitHub REST API
  description: >
    Manage repositories, issues, pull requests, and users on GitHub.
    Build integrations, automate workflows, and extend GitHub.
  version: "2022-11-28"
  contact:
    name: GitHub
    url: https://docs.github.com/en/rest
servers:
  - url: https://api.github.com
    description: GitHub REST API
tags:
  - name: repos
    description: Manage repositories
  - name: issues
    description: Track bugs, tasks, and feature requests
  - name: pulls
    description: Manage pull requests and code review
  - name: users
    description: Get user profile information

paths:
  /user/repos:
    get:
      operationId: listReposForAuthenticatedUser
      tags: [repos]
      summary: List repositories for the authenticated user
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [all, owner, public, private, member] }
        - name: sort
          in: query
          schema: { type: string, enum: [created, updated, pushed, full_name] }
        - name: per_page
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Repository" }
    post:
      operationId: createRepoForAuthenticatedUser
      tags: [repos]
      summary: Create a repository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                private: { type: boolean, default: false }
                auto_init: { type: boolean, default: false }
                license_template: { type: string }
      responses:
        "201":
          description: Repository created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Repository" }

  /repos/{owner}/{repo}:
    get:
      operationId: getRepo
      tags: [repos]
      summary: Get a repository
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Repository details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Repository" }
    patch:
      operationId: updateRepo
      tags: [repos]
      summary: Update a repository
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
                private: { type: boolean }
                default_branch: { type: string }
                has_issues: { type: boolean }
                has_wiki: { type: boolean }
                archived: { type: boolean }
      responses:
        "200":
          description: Updated repository
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Repository" }
    delete:
      operationId: deleteRepo
      tags: [repos]
      summary: Delete a repository
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Repository deleted

  /repos/{owner}/{repo}/issues:
    get:
      operationId: listIssues
      tags: [issues]
      summary: List issues for a repository
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string, enum: [open, closed, all], default: open }
        - name: labels
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [created, updated, comments] }
        - name: per_page
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Issue list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Issue" }
    post:
      operationId: createIssue
      tags: [issues]
      summary: Create an issue
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                body: { type: string }
                labels: { type: array, items: { type: string } }
                assignees: { type: array, items: { type: string } }
                milestone: { type: integer }
      responses:
        "201":
          description: Issue created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }

  /repos/{owner}/{repo}/issues/{issue_number}:
    get:
      operationId: getIssue
      tags: [issues]
      summary: Get an issue
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
        - name: issue_number
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
    patch:
      operationId: updateIssue
      tags: [issues]
      summary: Update an issue
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
        - name: issue_number
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
                state: { type: string, enum: [open, closed] }
                labels: { type: array, items: { type: string } }
                assignees: { type: array, items: { type: string } }
      responses:
        "200":
          description: Updated issue
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }

  /repos/{owner}/{repo}/pulls:
    get:
      operationId: listPullRequests
      tags: [pulls]
      summary: List pull requests
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string, enum: [open, closed, all], default: open }
        - name: sort
          in: query
          schema: { type: string, enum: [created, updated, popularity] }
        - name: per_page
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Pull request list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PullRequest" }
    post:
      operationId: createPullRequest
      tags: [pulls]
      summary: Create a pull request
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, head, base]
              properties:
                title: { type: string }
                body: { type: string }
                head: { type: string }
                base: { type: string }
                draft: { type: boolean, default: false }
      responses:
        "201":
          description: Pull request created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PullRequest" }

  /repos/{owner}/{repo}/pulls/{pull_number}:
    get:
      operationId: getPullRequest
      tags: [pulls]
      summary: Get a pull request
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
        - name: pull_number
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Pull request details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PullRequest" }
    patch:
      operationId: updatePullRequest
      tags: [pulls]
      summary: Update a pull request
      parameters:
        - name: owner
          in: path
          required: true
          schema: { type: string }
        - name: repo
          in: path
          required: true
          schema: { type: string }
        - name: pull_number
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
                state: { type: string, enum: [open, closed] }
                base: { type: string }
      responses:
        "200":
          description: Updated pull request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PullRequest" }

  /users/{username}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user profile
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /user:
    get:
      operationId: getAuthenticatedUser
      tags: [users]
      summary: Get the authenticated user
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

components:
  schemas:
    Repository:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        full_name: { type: string }
        description: { type: string }
        private: { type: boolean }
        owner: { $ref: "#/components/schemas/User" }
        html_url: { type: string }
        default_branch: { type: string }
        language: { type: string }
        stargazers_count: { type: integer }
        forks_count: { type: integer }
        open_issues_count: { type: integer }
        archived: { type: boolean }
        has_issues: { type: boolean }
        has_wiki: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        pushed_at: { type: string, format: date-time }

    Issue:
      type: object
      properties:
        id: { type: integer }
        number: { type: integer }
        title: { type: string }
        body: { type: string }
        state: { type: string, enum: [open, closed] }
        labels: { type: array, items: { type: object, properties: { name: { type: string }, color: { type: string } } } }
        assignees: { type: array, items: { $ref: "#/components/schemas/User" } }
        comments: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }

    PullRequest:
      type: object
      properties:
        id: { type: integer }
        number: { type: integer }
        title: { type: string }
        body: { type: string }
        state: { type: string, enum: [open, closed] }
        head: { type: object, properties: { ref: { type: string }, sha: { type: string } } }
        base: { type: object, properties: { ref: { type: string }, sha: { type: string } } }
        draft: { type: boolean }
        merged: { type: boolean }
        mergeable: { type: boolean }
        additions: { type: integer }
        deletions: { type: integer }
        changed_files: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        merged_at: { type: string, format: date-time, nullable: true }

    User:
      type: object
      properties:
        id: { type: integer }
        login: { type: string }
        name: { type: string }
        avatar_url: { type: string }
        html_url: { type: string }
        type: { type: string, enum: [User, Organization] }
        bio: { type: string }
        public_repos: { type: integer }
        followers: { type: integer }
        following: { type: integer }
        created_at: { type: string, format: date-time }
